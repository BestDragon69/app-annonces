version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: annonces_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: annonces
      POSTGRES_USER: annonces_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annonces_user -d annonces"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: annonces_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://annonces_user:${DB_PASSWORD:-changeme}@postgres:5432/annonces
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"

  # client:
  #   build:
  #     context: ./client
  #     dockerfile: Dockerfile
  #   container_name: annonces_client
  #   restart: unless-stopped
  #   depends_on:
  #     - server
  #   ports:
  #     - "80:80"

volumes:
  postgres_data:
  uploads_data:
